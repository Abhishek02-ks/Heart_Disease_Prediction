<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-icon">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M11.9932 5.13581C9.9938 2.7984 6.65975 2.16964 4.15469 4.31001C1.64964 6.45038 1.29697 10.029 3.2642 12.3614C5.00067 14.4194 9.17647 18.0694 11.2338 19.8665C11.6669 20.245 12.3168 20.2464 12.7517 19.8698C14.8252 18.0754 19.0305 14.4533 20.767 12.3995C22.7483 10.0567 22.3789 6.44621 19.8548 4.31001C17.3307 2.17381 13.9925 2.7984 11.9932 5.13581Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Heart Disease Analysis</h1>
            <p>AI-powered diagnostic prediction tool based on patient data</p>
        </header>

        <form id="prediction-form">
            <div class="form-grid">
                
                <!-- Basic Info -->
                <div class="form-group">
                    <label for="age">Age (Years)</label>
                    <input type="number" id="age" name="age" required min="1" max="120" placeholder="e.g. 45">
                </div>
                
                <div class="form-group">
                    <label for="sex">Gender</label>
                    <select id="sex" name="sex" required>
                        <option value="" disabled selected>Select gender</option>
                        <option value="1">Male (1)</option>
                        <option value="0">Female (0)</option>
                    </select>
                </div>

                <!-- Medical Symptoms -->
                <div class="form-group">
                    <label for="cp">Chest Pain Type</label>
                    <select id="cp" name="cp" required>
                        <option value="" disabled selected>Select type</option>
                        <option value="0">Typical Angina (0)</option>
                        <option value="1">Atypical Angina (1)</option>
                        <option value="2">Non-anginal Pain (2)</option>
                        <option value="3">Asymptomatic (3)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="trestbps">Resting BP (mm Hg)</label>
                    <input type="number" id="trestbps" name="trestbps" required min="50" max="250" placeholder="e.g. 120">
                </div>

                <div class="form-group">
                    <label for="chol">Cholesterol (mg/dl)</label>
                    <input type="number" id="chol" name="chol" required min="50" max="600" placeholder="e.g. 200">
                </div>

                <!-- Blood & ECG -->
                <div class="form-group">
                    <label for="fbs">Fasting Blood Sugar</label>
                    <select id="fbs" name="fbs" required>
                        <option value="" disabled selected>Select FBS</option>
                        <option value="0">≤ 120 mg/dl (0)</option>
                        <option value="1">> 120 mg/dl (1)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="restecg">ECG Result</label>
                    <select id="restecg" name="restecg" required>
                        <option value="" disabled selected>Select result</option>
                        <option value="0">Normal (0)</option>
                        <option value="1">Abnormal (1)</option>
                        <option value="2">Hypertrophy (2)</option>
                    </select>
                </div>

                <!-- Heart Activity -->
                <div class="form-group">
                    <label for="thalach">Max Heart Rate</label>
                    <input type="number" id="thalach" name="thalach" required min="50" max="250" placeholder="e.g. 150">
                </div>

                <div class="form-group">
                    <label for="exang">Exercise Angina</label>
                    <select id="exang" name="exang" required>
                        <option value="" disabled selected>Select status</option>
                        <option value="0">No (0)</option>
                        <option value="1">Yes (1)</option>
                    </select>
                </div>

                <!-- Advanced Indicators -->
                <div class="form-group">
                    <label for="oldpeak">ST Depression</label>
                    <input type="number" step="0.1" id="oldpeak" name="oldpeak" required placeholder="e.g. 1.0">
                </div>

                <div class="form-group">
                    <label for="slope">ST Segment Slope</label>
                    <select id="slope" name="slope" required>
                        <option value="" disabled selected>Select slope</option>
                        <option value="0">Upsloping (0)</option>
                        <option value="1">Flat (1)</option>
                        <option value="2">Downsloping (2)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="ca">Major Vessels</label>
                    <select id="ca" name="ca" required>
                        <option value="" disabled selected>Number (0-3)</option>
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="thal">Thalassemia</label>
                    <select id="thal" name="thal" required>
                        <option value="" disabled selected>Select thal</option>
                        <option value="1">Normal (1)</option>
                        <option value="2">Fixed Defect (2)</option>
                        <option value="3">Reversible Defect (3)</option>
                    </select>
                </div>

            </div>

            <button type="submit" id="submit-btn">
                <span class="btn-text">Run Prediction</span>
                <span class="loader" style="display: none;"></span>
            </button>
        </form>

        <div id="result-overlay" class="result-overlay">
            <div class="result-card">
                <button id="close-result" class="close-btn">&times;</button>
                <div class="result-icon pulse"></div>
                <h2 id="result-title">Analysis Complete</h2>
                <div class="probability-container">
                    <div class="progress-ring">
                        <svg class="progress-svg" viewBox="0 0 100 100">
                            <circle class="progress-track" cx="50" cy="50" r="45"></circle>
                            <circle class="progress-bar" id="score-bar" cx="50" cy="50" r="45"></circle>
                        </svg>
                        <div class="score-text" id="probability-score">0%</div>
                    </div>
                </div>
                <p id="result-message" class="result-message">Fetching results...</p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
